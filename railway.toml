[build]
builder = "railpack"
buildCommand = "cd backend && pip install -r requirements.txt"

[deploy]
startCommand = "cd backend && (alembic upgrade head || echo '[railway] alembic skipped - check DATABASE_URL') && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
